<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Aprende a Ler e a Escrever</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1f4d3a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px 0;
    box-sizing: border-box;
}

.app {
    background: #ffffff;
    width: 1500px;
    max-width: 95%;
    border-radius: 20px;
    padding: 25px 35px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    position: relative;
}

.header {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 15px;
}

.logo {
    height: 130px;      
    width: auto;
    margin-right: 15px; 
}

.title {
    font-size: 80px;
    font-weight: 700;
    color: #1f4d3a;
    text-align: center;
    flex: 1;
}

#imagem {
    width: 380px;
    height: 250px;
    object-fit: contain;
    margin: -25px auto;
}

.trace {
    font-size: 95px;
    letter-spacing: 8px;
    color: black;
    margin-bottom: 0px;
    text-align: center;
}

.input-area {
    width: 110%;
    display: flex;
    justify-content: center;
}

input {
    width: 490px; 
    padding: 18px;
    font-size: 60px;
    border-radius: 18px;
    border: 2px solid #ddd;
    text-align: center;
}

input:focus {
    border-color: #1f4d3a;
    outline: none;
}

button {
    padding: 15px 120px; 
    font-size: 25px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    background: #00428C;
    color: white;
}

button:hover {
    background: #FF0000;
}

#feedback {
    margin-top: -5px;
    font-size: 22px;
    min-height: 28px;
    text-align: left;
    color: #101372;
}

.credits {
    margin-top: 0px;
    font-size: 20px;
    color: #000000;
    font-weight: bold;
    text-align: center;
    width: 100%; 
}

.stars {
    position: absolute;
    top: 15px;
    right: 65px;
    font-size: 45px; 
    color: #f1c40f;
    font-weight: 700;
}

#contador {
    color: #001f4d;  /* azul escuro */
    font-weight: bold;
    font-size: 45px;  
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <img src="capadojogo.png" alt="Logo do Jogo" class="logo">
        <div class="title">APRENDE A LER E A ESCREVER</div>
    </div>

    <div class="stars">⭐ <span id="contador">0</span></div>

    <img id="imagem">

    <div class="trace" id="palavra"></div>

    <div class="input-area">
        <input type="text" id="resposta" placeholder="Escreve a palavra">
    </div>

    <button id="verificarBtn">Verificar</button>

    <div id="feedback"></div>

    <div class="credits">RECURSO DESENVOLVIDO POR PROFESSOR MÁRIO MENEZES email:mario_menezes2009@edu.madeira.gov.pt</div>

</div>

<script>
const nomes = [
 "fumo","anel","papagaio","nota","cama","figo","universo","foca","copo","pote",
 "galo","laje","energia","sol","vela","lupa","gato","lata","papa","nata","faca",
 "cogumelo","amigo","pato","lula","elefante","Jaime","navio","yoyo","tapete","igreja",
 "mota","bule","Wilson","yoga","ovo","Fátima","capa","pipa","mãe","táxi","sola","Vilela",
 "bebé","loto","Yara","kiwi","Pepe","teia","totó","Tito","apita","Lili","lua",
 "dedo","dado","data","Didi","dia","dália","mala","Mimi","meia","mata","viola","vela",
 "Violeta","luva","cão","cola","capa","cuco","novelo","neve","Nini","rato","roda","rua",
 "remo","ramo","rola","bola","bolo","bata","Bela","gola","Gugu","sapo","sapato","sino",
 "sopa","janela","judo","tijolo","jipe","fatia","zínia","gazela","azulejo","azul","baliza",
 "búzio","hiena","holofote","Helena","hipopótamo","hábito","humano","avião","abelha","amor",
 "alface","escola","estrela","escova","enfeite","ilha","índio","iogurte","isqueiro","inverno",
 "osso","olá","óculos","orvalho","onda","uva","unha","uniforme","kilo","Kyara","kit",
 "kilt","karting","queijo","quarto","quilo","queque","querida","quero","web","wifi","windsurf",
 "whisky","web cam","xixi","eixo","exame","xerife","Xana","yak","yin","Yuki"
];

const palavras = nomes.map(n => ({
    nome: n,
    img: n + ".png"
}));

// Função para embaralhar um array
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Embaralhar palavras ao iniciar
shuffle(palavras);

let atualIndex = 0;
let estrelas = 0;

function novaPalavra() {
    if(atualIndex >= palavras.length){
        document.getElementById("imagem").src = "";
        document.getElementById("palavra").textContent = "Fim!";
        document.getElementById("resposta").disabled = true;
        document.getElementById("verificarBtn").disabled = true;

        const btnContainer = document.createElement("div");
        btnContainer.style.display = "flex";
        btnContainer.style.justifyContent = "center";
        btnContainer.style.gap = "15px";
        btnContainer.style.marginTop = "20px";

        const reiniciarBtn = document.createElement("button");
        reiniciarBtn.textContent = "Reiniciar";
        reiniciarBtn.style.padding = "18px 100px"; 
        reiniciarBtn.style.fontSize = "22px";

        reiniciarBtn.addEventListener("click", function() {
            estrelas = 0;
            atualIndex = 0;
            document.getElementById("contador").textContent = estrelas;
            document.getElementById("resposta").disabled = false;
            document.getElementById("verificarBtn").disabled = false;
            
            shuffle(palavras); // embaralhar novamente ao reiniciar

            btnContainer.remove();
            novaPalavra();
        });

        const verificarBtn = document.getElementById("verificarBtn");
        btnContainer.appendChild(verificarBtn);
        btnContainer.appendChild(reiniciarBtn);
        document.querySelector(".app").appendChild(btnContainer);

        return;
    }

    const atual = palavras[atualIndex];
    document.getElementById("imagem").src = atual.img;
    document.getElementById("palavra").textContent = atual.nome;
    document.getElementById("resposta").value = "";
    document.getElementById("feedback").textContent = "";
    document.getElementById("resposta").focus();
}

function verificar() {
    const resposta = document.getElementById("resposta").value.trim();
    const fb = document.getElementById("feedback");
    const atual = palavras[atualIndex];

    if (resposta === atual.nome) {
        estrelas++;
        document.getElementById("contador").textContent = estrelas;
        fb.textContent = "✔️ Muito bem!";
        fb.style.color = "#006400";
        fb.style.fontWeight = "bold";
        atualIndex++;
        setTimeout(novaPalavra, 800);
    } else {
        fb.textContent = "Tenta outra vez";
        fb.style.color = "#e74c3c";
    }
}

document.getElementById("verificarBtn").addEventListener("click", verificar);
document.getElementById("resposta").addEventListener("keypress", function(e) {
    if (e.key === "Enter") verificar();
});

novaPalavra();
</script>

</body>
</html>
